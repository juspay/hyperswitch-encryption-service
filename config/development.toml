[metrics_server]
host = "127.0.0.1"
port = 6128

[pool_config]
pool = 2

[server]
host = "127.0.0.1"
port = 5000

[database]
user = "db_user"
password = "db_pass"
host = "localhost"
port = 5432
dbname = "encryption_db"
pool_size = 5
min_idle = 2
enable_ssl = false

[multitenancy.tenants.public]
cache_prefix = "public"
schema = "public"

[multitenancy.tenants.global]
cache_prefix = "global"
schema = "global"

[log]
log_level = "debug"
log_format = "console"

[secrets.kms_config]
key_id = "arn:aws:kms:eu-central-1:701342709052:key/f2a87638-cbcd-4109-95a7-43bdd238eeb1"
region = "eu-central-1"
skip_key_id_on_decrypt = true
